name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least-privilege default token for every job in this workflow.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1.2.2
        with:
          # Pinned: Bun 1.3.12 produced corrupt macOS code signatures
          # (oven-sh/bun#29120); fixed in 1.3.13. Bump this intentionally
          # after reviewing Bun release notes.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run type-check

      - name: Build binary
        run: bun run build

      - name: Verify binary (--version)
        run: ./dist/slackcli --version

      - name: Verify binary (--help)
        run: ./dist/slackcli --help

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s dist/slackcli)
          echo "Binary size: $(($SIZE / 1024 / 1024)) MB"
          if [ $SIZE -gt 157286400 ]; then
            echo "Binary size exceeds 150MB limit"
            exit 1
          fi
