name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least-privilege default token for every job in this workflow.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned: Bun 1.3.12 produced corrupt macOS code signatures
          # (oven-sh/bun#29120); fixed in 1.3.13. Bump this intentionally
          # after reviewing Bun release notes.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run type-check

      - name: Build binary
        run: bun run build

      - name: Verify binary (--version)
        run: ./dist/slackcli --version

      - name: Verify binary (--help)
        run: ./dist/slackcli --help

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s dist/slackcli)
          echo "Binary size: $(($SIZE / 1024 / 1024)) MB"
          if [ $SIZE -gt 157286400 ]; then
            echo "Binary size exceeds 150MB limit"
            exit 1
          fi
