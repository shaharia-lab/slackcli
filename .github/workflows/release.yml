name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Least-privilege default: jobs are read-only unless they opt into more below.
permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: slackcli-linux
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: slackcli-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: slackcli-macos
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: slackcli-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: slackcli-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned: Bun 1.3.12 produced corrupt macOS code signatures that
          # caused the released binary to be killed on launch on Apple
          # Silicon (issue #43, oven-sh/bun#29120). Fixed in Bun 1.3.13.
          # Bump intentionally after reviewing Bun release notes.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build binary
        run: bun build --compile --minify --target=${{ matrix.target }} --define __APP_VERSION__='"${{ steps.version.outputs.VERSION }}"' src/index.ts --outfile dist/${{ matrix.artifact }}

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - dist/${{ matrix.artifact }}
          codesign --verify --verbose dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          retention-days: 1
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only this job writes to the repo (creating the GitHub Release).
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Organize artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name 'slackcli-linux' -o -name 'slackcli-linux-arm64' -o -name 'slackcli-macos' -o -name 'slackcli-macos-arm64' -o -name 'slackcli-windows.exe' \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    # No write access to THIS repo is needed; the cross-repo write to
    # homebrew-tap is authorized solely by the token in GH_TOKEN below.
    permissions:
      contents: read
    steps:
      # Mint a short-lived (≈1h) installation token from a dedicated
      # GitHub App scoped to the homebrew-tap repo only. Replaces the
      # long-lived HOMEBREW_TAP_TOKEN PAT (#52).
      - name: Mint Homebrew tap token
        id: tap_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: shaharia-lab
          repositories: homebrew-tap

      - name: Update Homebrew formulas
        env:
          GH_TOKEN: ${{ steps.tap_token.outputs.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          VERSION_CLASS=$(echo "$VERSION_NUM" | tr -d '.')

          # Calculate SHA256 for all binaries
          echo "Calculating SHA256 checksums..."
          SHA_MACOS_X86=$(curl -sL "https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos" | sha256sum | cut -d' ' -f1)
          SHA_MACOS_ARM=$(curl -sL "https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos-arm64" | sha256sum | cut -d' ' -f1)
          SHA_LINUX=$(curl -sL "https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux" | sha256sum | cut -d' ' -f1)
          SHA_LINUX_ARM=$(curl -sL "https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux-arm64" | sha256sum | cut -d' ' -f1)
          echo "SHA256 macOS x86_64: ${SHA_MACOS_X86}"
          echo "SHA256 macOS arm64: ${SHA_MACOS_ARM}"
          echo "SHA256 Linux x86_64: ${SHA_LINUX}"
          echo "SHA256 Linux arm64: ${SHA_LINUX_ARM}"

          # Main formula content
          MAIN_FORMULA="# typed: false
          # frozen_string_literal: true

          class Slackcli < Formula
            desc \"Slack CLI - Interact with Slack from command line\"
            homepage \"https://github.com/shaharia-lab/slackcli\"
            version \"${VERSION_NUM}\"
            license \"MIT\"

            on_macos do
              if Hardware::CPU.intel?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos\"
                sha256 \"${SHA_MACOS_X86}\"

                def install
                  bin.install \"slackcli-macos\" => \"slackcli\"
                end
              end
              if Hardware::CPU.arm?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos-arm64\"
                sha256 \"${SHA_MACOS_ARM}\"

                def install
                  bin.install \"slackcli-macos-arm64\" => \"slackcli\"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux\"
                sha256 \"${SHA_LINUX}\"

                def install
                  bin.install \"slackcli-linux\" => \"slackcli\"
                end
              end
              if Hardware::CPU.arm?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux-arm64\"
                sha256 \"${SHA_LINUX_ARM}\"

                def install
                  bin.install \"slackcli-linux-arm64\" => \"slackcli\"
                end
              end
            end

            test do
              system \"\#{bin}/slackcli\", \"--version\"
            end
          end"

          # Versioned formula content
          VERSIONED_FORMULA="# typed: false
          # frozen_string_literal: true

          class SlackcliAT${VERSION_CLASS} < Formula
            desc \"Slack CLI - Interact with Slack from command line\"
            homepage \"https://github.com/shaharia-lab/slackcli\"
            version \"${VERSION_NUM}\"
            license \"MIT\"

            keg_only :versioned_formula

            on_macos do
              if Hardware::CPU.intel?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos\"
                sha256 \"${SHA_MACOS_X86}\"

                def install
                  bin.install \"slackcli-macos\" => \"slackcli\"
                end
              end
              if Hardware::CPU.arm?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-macos-arm64\"
                sha256 \"${SHA_MACOS_ARM}\"

                def install
                  bin.install \"slackcli-macos-arm64\" => \"slackcli\"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux\"
                sha256 \"${SHA_LINUX}\"

                def install
                  bin.install \"slackcli-linux\" => \"slackcli\"
                end
              end
              if Hardware::CPU.arm?
                url \"https://github.com/shaharia-lab/slackcli/releases/download/${VERSION}/slackcli-linux-arm64\"
                sha256 \"${SHA_LINUX_ARM}\"

                def install
                  bin.install \"slackcli-linux-arm64\" => \"slackcli\"
                end
              end
            end

            test do
              system \"\#{bin}/slackcli\", \"--version\"
            end
          end"

          # Update main formula
          echo "Updating main formula slackcli.rb..."
          MAIN_SHA=$(gh api "repos/shaharia-lab/homebrew-tap/contents/Formula/slackcli.rb" --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$MAIN_SHA" ]; then
            echo "$MAIN_FORMULA" | gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/slackcli.rb" \
              -f message="slackcli ${VERSION_NUM}" \
              -f content="$(echo "$MAIN_FORMULA" | base64 -w0)" \
              -f sha="$MAIN_SHA" \
              -f branch="main"
          else
            echo "$MAIN_FORMULA" | gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/slackcli.rb" \
              -f message="slackcli ${VERSION_NUM}" \
              -f content="$(echo "$MAIN_FORMULA" | base64 -w0)" \
              -f branch="main"
          fi

          # Create versioned formula if it doesn't exist
          if gh api "repos/shaharia-lab/homebrew-tap/contents/Formula/slackcli@${VERSION_NUM}.rb" --silent 2>/dev/null; then
            echo "Versioned formula slackcli@${VERSION_NUM}.rb already exists, skipping"
          else
            echo "Creating versioned formula slackcli@${VERSION_NUM}.rb..."
            echo "$VERSIONED_FORMULA" | gh api --method PUT "repos/shaharia-lab/homebrew-tap/contents/Formula/slackcli@${VERSION_NUM}.rb" \
              -f message="Add slackcli@${VERSION_NUM} versioned formula" \
              -f content="$(echo "$VERSIONED_FORMULA" | base64 -w0)" \
              -f branch="main"
          fi

          echo "Homebrew formulas updated successfully!"
