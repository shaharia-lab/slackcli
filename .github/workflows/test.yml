name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least-privilege default token for every job in this workflow.
permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned: keep CI aligned with release.yml. See release.yml for
          # details on the 1.3.12 macOS codesign regression.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test || echo "No tests yet"

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Pinned: keep CI aligned with release.yml. See release.yml for
          # details on the 1.3.12 macOS codesign regression.
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build

      - name: Test help command
        run: ./dist/slackcli --help

      - name: Test version command
        run: ./dist/slackcli --version

      - name: Test auth commands (help)
        run: ./dist/slackcli auth --help
